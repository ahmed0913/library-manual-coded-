{% extends "base.html" %}
{% block title %}Edit Book - Library System{% endblock %}

{% block content %}
<div class="page-header">
    <h1>✏️ Edit Book</h1>
    <a href="{{ url_for('home') }}" class="btn btn-secondary">← Back to Books</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('edit_book', book_id=book.id) }}" enctype="multipart/form-data">

        <div class="form-group">
            <label for="title">Book Title *</label>
            <input type="text" id="title" name="title"
                   value="{{ book.title }}" required>
        </div>

        <div class="form-group">
            <label for="author">Author *</label>
            <input type="text" id="author" name="author"
                   value="{{ book.author }}" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description"
                      rows="4">{{ book.description or '' }}</textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="category_id">Category</label>
                <select id="category_id" name="category_id">
                    <option value="">-- Select Category --</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}"
                                {% if cat.id == book.category_id %}selected{% endif %}>
                            {{ cat.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="price">Price (EGP)</label>
                <input type="number" id="price" name="price"
                       step="0.01" min="0" value="{{ book.price }}">
            </div>
        </div>

        <div class="form-group">
            <label for="image">Book Cover Image</label>

            <!-- Show current image if exists -->
            {% if book.image_path %}
                <div class="current-image">
                    <p>Current image:</p>
                    <img src="{{ url_for('static', filename='uploads/' + book.image_path) }}"
                         alt="{{ book.title }}">
                </div>
            {% endif %}

            <input type="file" id="image" name="image"
                   accept="image/*" onchange="previewImage(this)">
            <small class="form-hint">Leave empty to keep the current image</small>
            <div id="image-preview" class="image-preview"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-full">💾 Save Changes</button>
    </form>
</div>
{% endblock %}
