{% extends "base.html" %}
{% block title %}Add Book - Library System{% endblock %}

{% block content %}
<div class="page-header">
    <h1>📖 Add New Book</h1>
    <a href="{{ url_for('home') }}" class="btn btn-secondary">← Back to Books</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('add_book') }}" enctype="multipart/form-data">

        <div class="form-group">
            <label for="title">Book Title *</label>
            <input type="text" id="title" name="title"
                   placeholder="Enter book title" required>
        </div>

        <div class="form-group">
            <label for="author">Author *</label>
            <input type="text" id="author" name="author"
                   placeholder="Enter author name" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4"
                      placeholder="Enter book description (optional)"></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="category_id">Category</label>
                <select id="category_id" name="category_id">
                    <option value="">-- Select Category --</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="price">Price (EGP)</label>
                <input type="number" id="price" name="price"
                       step="0.01" min="0" placeholder="0.00" value="0">
            </div>
        </div>

        <div class="form-group">
            <label for="image">Book Cover Image</label>
            <input type="file" id="image" name="image"
                   accept="image/*" onchange="previewImage(this)">
            <div id="image-preview" class="image-preview"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-full">📖 Add Book</button>
    </form>
</div>
{% endblock %}
